buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.2.12479018"
        kotlinVersion = "1.9.24"
        googleMobileAdsJson = false
    }
    repositories {
        google()
        mavenCentral()
       maven { url "https://www.jitpack.io" }
      maven { url 'https://maven.google.com' }
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    plugins.withId("com.android.application") {
        android {
            defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384",
                                  "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"
                    }
                    ndkBuild {
                        arguments "APP_SUPPORT_FLEXIBLE_PAGE_SIZES:=true"
                    }
                }
            }
        }
    }
    plugins.withId("com.android.library") {
        android {
            defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384",
                                  "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384"
                    }
                    ndkBuild {
                        arguments "APP_SUPPORT_FLEXIBLE_PAGE_SIZES:=true"
                    }
                }
            }
        }
    }
}

